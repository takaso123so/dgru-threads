name: Threads Auto Post

on:
  schedule:
    - cron: '*/15 * * * *'  # 15分ごと（テスト用）
  workflow_dispatch:
    inputs:
      breed:
        description: '投稿する犬種（shiba / schnauzer / all）'
        default: 'all'

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Post to Threads
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          SHIBA_ACCOUNT_ID: ${{ secrets.SHIBA_ACCOUNT_ID }}
          SHIBA_ACCESS_TOKEN: ${{ secrets.SHIBA_ACCESS_TOKEN }}
          SCHNAUZER_ACCOUNT_ID: ${{ secrets.SCHNAUZER_ACCOUNT_ID }}
          SCHNAUZER_ACCESS_TOKEN: ${{ secrets.SCHNAUZER_ACCESS_TOKEN }}
        run: |
          BREED="${{ github.event.inputs.breed }}"
          if [ "$BREED" = "shiba" ]; then
            python main.py shiba
          elif [ "$BREED" = "schnauzer" ]; then
            python main.py schnauzer
          else
            python main.py shiba
            python main.py schnauzer
          fi
