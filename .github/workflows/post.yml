name: Threads Auto Post

on:
  schedule:
    - cron: '0 0 * * *'    # JST 9:00  - dgru_text (全犬種、shiba除く)
    - cron: '0 12 * * *'   # JST 21:00 - dgru_image (全犬種、shiba除く)
    - cron: '30 23 * * *'  # JST 8:30  - shiba trend_commentary
    - cron: '30 3 * * *'   # JST 12:30 - shiba trend_commentary
    - cron: '30 7 * * *'   # JST 16:30 - shiba casual (コマ漫画日は画像生成→commit→post)
    - cron: '0 10 * * *'   # JST 19:00 - shiba product_intro
    - cron: '0 23 * * *'   # JST 8:00  - toypoodle trend_commentary
    - cron: '0 4 * * *'    # JST 13:00 - toypoodle trend_commentary
    - cron: '0 8 * * *'    # JST 17:00 - toypoodle casual (コマ漫画日は画像生成→commit→post)
    - cron: '30 10 * * *'  # JST 19:30 - toypoodle product_intro
    - cron: '30 0 * * *'   # JST 9:30  - cavalier trend_commentary
    - cron: '0 5 * * *'    # JST 14:00 - cavalier trend_commentary
    - cron: '30 8 * * *'   # JST 17:30 - cavalier casual (コマ漫画日は画像生成→commit→post)
    - cron: '30 11 * * *'  # JST 20:30 - cavalier product_intro
  workflow_dispatch:
    inputs:
      breed:
        description: '投稿する犬種キー（breeds.jsonのkey / all / all-with-shiba）'
        default: 'all'
      post_type:
        description: '投稿タイプ（dgru / dgru_image / dgru_text / curation / all / trend_commentary / casual / comic_generate / product_intro）'
        default: 'dgru'
      platform:
        description: '投稿先（threads / twitter / all）'
        default: 'threads'

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate and publish comic (shiba - 16:30 JST)
        if: github.event.schedule == '30 7 * * *'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DAY=$(date +%-d)
          if [ $((DAY % 2)) -eq 0 ]; then
            echo "[INFO] コマ漫画の日です（day=$DAY）"
            python main.py shiba comic_generate
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add comics/
            if ! git diff --cached --quiet; then
              git commit -m "chore: add comic panel $(date +%Y-%m-%d)"
              git push https://x-access-token:${GITHUB_TOKEN}@github.com/takaso123so/dgru-threads.git
              echo "[INFO] GitHub Pages反映待ち (120秒)..."
              sleep 120
            else
              echo "[INFO] 新しいコマ漫画はありません"
            fi
          else
            echo "[INFO] 今日はコマ漫画の日ではありません（day=$DAY）"
          fi

      - name: Generate and publish comic (toypoodle - 17:00 JST)
        if: github.event.schedule == '0 8 * * *'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DAY=$(date +%-d)
          if [ $((DAY % 2)) -eq 0 ]; then
            echo "[INFO] コマ漫画の日です（day=$DAY）"
            python main.py toypoodle comic_generate
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add comics/
            if ! git diff --cached --quiet; then
              git commit -m "chore: add comic panel $(date +%Y-%m-%d)"
              git push https://x-access-token:${GITHUB_TOKEN}@github.com/takaso123so/dgru-threads.git
              echo "[INFO] GitHub Pages反映待ち (120秒)..."
              sleep 120
            else
              echo "[INFO] 新しいコマ漫画はありません"
            fi
          else
            echo "[INFO] 今日はコマ漫画の日ではありません（day=$DAY）"
          fi

      - name: Generate and publish comic (cavalier - 17:30 JST)
        if: github.event.schedule == '30 8 * * *'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DAY=$(date +%-d)
          if [ $((DAY % 2)) -eq 0 ]; then
            echo "[INFO] コマ漫画の日です（day=$DAY）"
            python main.py cavalier comic_generate
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add comics/
            if ! git diff --cached --quiet; then
              git commit -m "chore: add comic panel $(date +%Y-%m-%d)"
              git push https://x-access-token:${GITHUB_TOKEN}@github.com/takaso123so/dgru-threads.git
              echo "[INFO] GitHub Pages反映待ち (120秒)..."
              sleep 120
            else
              echo "[INFO] 新しいコマ漫画はありません"
            fi
          else
            echo "[INFO] 今日はコマ漫画の日ではありません（day=$DAY）"
          fi

      - name: Post to Threads
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # Threads アカウント（犬種を追加したら下に同じ形式で追記する）
          SHIBA_ACCOUNT_ID: ${{ secrets.SHIBA_ACCOUNT_ID }}
          SHIBA_ACCESS_TOKEN: ${{ secrets.SHIBA_ACCESS_TOKEN }}
          SCHNAUZER_ACCOUNT_ID: ${{ secrets.SCHNAUZER_ACCOUNT_ID }}
          SCHNAUZER_ACCESS_TOKEN: ${{ secrets.SCHNAUZER_ACCESS_TOKEN }}
          CAVALIER_ACCOUNT_ID: ${{ secrets.CAVALIER_ACCOUNT_ID }}
          CAVALIER_ACCESS_TOKEN: ${{ secrets.CAVALIER_ACCESS_TOKEN }}
          TOYPOODLE_ACCOUNT_ID: ${{ secrets.TOYPOODLE_ACCOUNT_ID }}
          TOYPOODLE_ACCESS_TOKEN: ${{ secrets.TOYPOODLE_ACCESS_TOKEN }}
          CHIHUAHUA_ACCOUNT_ID: ${{ secrets.CHIHUAHUA_ACCOUNT_ID }}
          CHIHUAHUA_ACCESS_TOKEN: ${{ secrets.CHIHUAHUA_ACCESS_TOKEN }}
          DACHSHUND_ACCOUNT_ID: ${{ secrets.DACHSHUND_ACCOUNT_ID }}
          DACHSHUND_ACCESS_TOKEN: ${{ secrets.DACHSHUND_ACCESS_TOKEN }}
          # Twitter アカウント（共通APIキー）
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          # Twitter アカウント（犬種別）
          SHIBA_TW_ACCESS_TOKEN: ${{ secrets.SHIBA_TW_ACCESS_TOKEN }}
          SHIBA_TW_ACCESS_SECRET: ${{ secrets.SHIBA_TW_ACCESS_SECRET }}
          SCHNAUZER_TW_ACCESS_TOKEN: ${{ secrets.SCHNAUZER_TW_ACCESS_TOKEN }}
          SCHNAUZER_TW_ACCESS_SECRET: ${{ secrets.SCHNAUZER_TW_ACCESS_SECRET }}
          CAVALIER_TW_ACCESS_TOKEN: ${{ secrets.CAVALIER_TW_ACCESS_TOKEN }}
          CAVALIER_TW_ACCESS_SECRET: ${{ secrets.CAVALIER_TW_ACCESS_SECRET }}
          TOYPOODLE_TW_ACCESS_TOKEN: ${{ secrets.TOYPOODLE_TW_ACCESS_TOKEN }}
          TOYPOODLE_TW_ACCESS_SECRET: ${{ secrets.TOYPOODLE_TW_ACCESS_SECRET }}
          CHIHUAHUA_TW_ACCESS_TOKEN: ${{ secrets.CHIHUAHUA_TW_ACCESS_TOKEN }}
          CHIHUAHUA_TW_ACCESS_SECRET: ${{ secrets.CHIHUAHUA_TW_ACCESS_SECRET }}
          DACHSHUND_TW_ACCESS_TOKEN: ${{ secrets.DACHSHUND_TW_ACCESS_TOKEN }}
          DACHSHUND_TW_ACCESS_SECRET: ${{ secrets.DACHSHUND_TW_ACCESS_SECRET }}
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            case "${{ github.event.schedule }}" in
              "0 12 * * *")
                python main.py all dgru_image all ;;    # JST 21:00 - 全犬種（shiba除く）
              "30 23 * * *")
                python main.py shiba trend_commentary all ;;  # JST 8:30
              "30 3 * * *")
                python main.py shiba trend_commentary all ;;  # JST 12:30
              "30 7 * * *")
                python main.py shiba casual all ;;      # JST 16:30
              "0 10 * * *")
                python main.py shiba product_intro all ;; # JST 19:00
              "0 23 * * *")
                python main.py toypoodle trend_commentary all ;; # JST 8:00
              "0 4 * * *")
                python main.py toypoodle trend_commentary all ;; # JST 13:00
              "0 8 * * *")
                python main.py toypoodle casual all ;;   # JST 17:00
              "30 10 * * *")
                python main.py toypoodle product_intro all ;; # JST 19:30
              "30 0 * * *")
                python main.py cavalier trend_commentary all ;; # JST 9:30
              "0 5 * * *")
                python main.py cavalier trend_commentary all ;; # JST 14:00
              "30 8 * * *")
                python main.py cavalier casual all ;;    # JST 17:30
              "30 11 * * *")
                python main.py cavalier product_intro all ;; # JST 20:30
              *)
                python main.py all dgru_text all ;;     # JST 9:00 - 全犬種（shiba/toypoodle/cavalier除く）
            esac
          else
            python main.py ${{ github.event.inputs.breed }} ${{ github.event.inputs.post_type }} ${{ github.event.inputs.platform }}
          fi

      - name: Commit logs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add logs/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update post logs"
            git fetch https://x-access-token:${GITHUB_TOKEN}@github.com/takaso123so/dgru-threads.git main
            git merge -X ours FETCH_HEAD --no-edit
            git push https://x-access-token:${GITHUB_TOKEN}@github.com/takaso123so/dgru-threads.git
          fi
