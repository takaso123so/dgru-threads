name: Threads Auto Post

on:
  schedule:
    # 朝9時 JST (00:00 UTC) - ブランドメッセージ（テキストのみ）
    - cron: '0 0 * * *'    # JST  9:00 - shiba
    - cron: '5 0 * * *'    # JST  9:05 - dachshund
    - cron: '10 0 * * *'   # JST  9:10 - schnauzer
    - cron: '15 0 * * *'   # JST  9:15 - toypoodle
    - cron: '20 0 * * *'   # JST  9:20 - cavalier
    - cron: '25 0 * * *'   # JST  9:25 - chihuahua
    # 昼12時 JST (03:00 UTC) - 犬種雑学（テキストのみ）
    - cron: '0 3 * * *'    # JST 12:00 - shiba
    - cron: '5 3 * * *'    # JST 12:05 - dachshund
    - cron: '10 3 * * *'   # JST 12:10 - schnauzer
    - cron: '15 3 * * *'   # JST 12:15 - toypoodle
    - cron: '20 3 * * *'   # JST 12:20 - cavalier
    - cron: '25 3 * * *'   # JST 12:25 - chihuahua
    # 夜9時 JST (12:00 UTC) - 商品画像訴求
    - cron: '0 12 * * *'   # JST 21:00 - shiba
    - cron: '5 12 * * *'   # JST 21:05 - dachshund
    - cron: '10 12 * * *'  # JST 21:10 - schnauzer
    - cron: '15 12 * * *'  # JST 21:15 - toypoodle
    - cron: '20 12 * * *'  # JST 21:20 - cavalier
    - cron: '25 12 * * *'  # JST 21:25 - chihuahua
  workflow_dispatch:
    inputs:
      breed:
        description: '投稿する犬種キー（breeds.jsonのkey / all）'
        default: 'all'
      post_type:
        description: '投稿タイプ（product_intro / dgru / dgru_image / dgru_text / curation）'
        default: 'product_intro'
      platform:
        description: '投稿先（threads / twitter / all）'
        default: 'threads'

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Post to Threads
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # Threads アカウント（犬種を追加したら下に同じ形式で追記する）
          SHIBA_ACCOUNT_ID: ${{ secrets.SHIBA_ACCOUNT_ID }}
          SHIBA_ACCESS_TOKEN: ${{ secrets.SHIBA_ACCESS_TOKEN }}
          SCHNAUZER_ACCOUNT_ID: ${{ secrets.SCHNAUZER_ACCOUNT_ID }}
          SCHNAUZER_ACCESS_TOKEN: ${{ secrets.SCHNAUZER_ACCESS_TOKEN }}
          CAVALIER_ACCOUNT_ID: ${{ secrets.CAVALIER_ACCOUNT_ID }}
          CAVALIER_ACCESS_TOKEN: ${{ secrets.CAVALIER_ACCESS_TOKEN }}
          TOYPOODLE_ACCOUNT_ID: ${{ secrets.TOYPOODLE_ACCOUNT_ID }}
          TOYPOODLE_ACCESS_TOKEN: ${{ secrets.TOYPOODLE_ACCESS_TOKEN }}
          CHIHUAHUA_ACCOUNT_ID: ${{ secrets.CHIHUAHUA_ACCOUNT_ID }}
          CHIHUAHUA_ACCESS_TOKEN: ${{ secrets.CHIHUAHUA_ACCESS_TOKEN }}
          DACHSHUND_ACCOUNT_ID: ${{ secrets.DACHSHUND_ACCOUNT_ID }}
          DACHSHUND_ACCESS_TOKEN: ${{ secrets.DACHSHUND_ACCESS_TOKEN }}
          # Twitter アカウント（共通APIキー）
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          # Twitter アカウント（犬種別）
          SHIBA_TW_ACCESS_TOKEN: ${{ secrets.SHIBA_TW_ACCESS_TOKEN }}
          SHIBA_TW_ACCESS_SECRET: ${{ secrets.SHIBA_TW_ACCESS_SECRET }}
          SCHNAUZER_TW_ACCESS_TOKEN: ${{ secrets.SCHNAUZER_TW_ACCESS_TOKEN }}
          SCHNAUZER_TW_ACCESS_SECRET: ${{ secrets.SCHNAUZER_TW_ACCESS_SECRET }}
          CAVALIER_TW_ACCESS_TOKEN: ${{ secrets.CAVALIER_TW_ACCESS_TOKEN }}
          CAVALIER_TW_ACCESS_SECRET: ${{ secrets.CAVALIER_TW_ACCESS_SECRET }}
          TOYPOODLE_TW_ACCESS_TOKEN: ${{ secrets.TOYPOODLE_TW_ACCESS_TOKEN }}
          TOYPOODLE_TW_ACCESS_SECRET: ${{ secrets.TOYPOODLE_TW_ACCESS_SECRET }}
          CHIHUAHUA_TW_ACCESS_TOKEN: ${{ secrets.CHIHUAHUA_TW_ACCESS_TOKEN }}
          CHIHUAHUA_TW_ACCESS_SECRET: ${{ secrets.CHIHUAHUA_TW_ACCESS_SECRET }}
          DACHSHUND_TW_ACCESS_TOKEN: ${{ secrets.DACHSHUND_TW_ACCESS_TOKEN }}
          DACHSHUND_TW_ACCESS_SECRET: ${{ secrets.DACHSHUND_TW_ACCESS_SECRET }}
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            case "${{ github.event.schedule }}" in
              "0 0 * * *")   python main.py shiba morning_brand threads ;;     # JST  9:00
              "5 0 * * *")   python main.py dachshund morning_brand threads ;; # JST  9:05
              "10 0 * * *")  python main.py schnauzer morning_brand threads ;; # JST  9:10
              "15 0 * * *")  python main.py toypoodle morning_brand threads ;; # JST  9:15
              "20 0 * * *")  python main.py cavalier morning_brand threads ;;  # JST  9:20
              "25 0 * * *")  python main.py chihuahua morning_brand threads ;; # JST  9:25
              "0 3 * * *")   python main.py shiba noon_knowledge threads ;;    # JST 12:00
              "5 3 * * *")   python main.py dachshund noon_knowledge threads ;; # JST 12:05
              "10 3 * * *")  python main.py schnauzer noon_knowledge threads ;; # JST 12:10
              "15 3 * * *")  python main.py toypoodle noon_knowledge threads ;; # JST 12:15
              "20 3 * * *")  python main.py cavalier noon_knowledge threads ;;  # JST 12:20
              "25 3 * * *")  python main.py chihuahua noon_knowledge threads ;; # JST 12:25
              "0 12 * * *")  python main.py shiba product_intro threads ;;     # JST 21:00
              "5 12 * * *")  python main.py dachshund product_intro threads ;; # JST 21:05
              "10 12 * * *") python main.py schnauzer product_intro threads ;; # JST 21:10
              "15 12 * * *") python main.py toypoodle product_intro threads ;; # JST 21:15
              "20 12 * * *") python main.py cavalier product_intro threads ;;  # JST 21:20
              "25 12 * * *") python main.py chihuahua product_intro threads ;; # JST 21:25
            esac
          else
            python main.py ${{ github.event.inputs.breed }} ${{ github.event.inputs.post_type }} ${{ github.event.inputs.platform }}
          fi

      - name: Commit logs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add logs/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update post logs"
            git fetch https://x-access-token:${GITHUB_TOKEN}@github.com/takaso123so/dgru-threads.git main
            git merge -X ours FETCH_HEAD --no-edit
            git push https://x-access-token:${GITHUB_TOKEN}@github.com/takaso123so/dgru-threads.git
          fi
