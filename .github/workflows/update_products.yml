name: Update Product Lists

on:
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Update product CSVs
        # breeds.jsonに追加された犬種も自動で取得される
        # GitHub Secretsの追加は不要（BASEスクレイピングのみ）
        run: python fetcher/update_products.py

      - name: Commit updated CSVs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "chore: update product lists"
          git push https://x-access-token:${GITHUB_TOKEN}@github.com/takaso123so/dgru-threads.git
