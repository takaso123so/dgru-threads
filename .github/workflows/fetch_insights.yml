name: Fetch Threads Insights

on:
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download existing logs
        uses: actions/download-artifact@v4
        with:
          name: post-logs
          path: logs/
        continue-on-error: true

      - name: Fetch insights
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          # 犬種を追加したら下に同じ形式で追記する
          SHIBA_ACCOUNT_ID: ${{ secrets.SHIBA_ACCOUNT_ID }}
          SHIBA_ACCESS_TOKEN: ${{ secrets.SHIBA_ACCESS_TOKEN }}
          SCHNAUZER_ACCOUNT_ID: ${{ secrets.SCHNAUZER_ACCOUNT_ID }}
          SCHNAUZER_ACCESS_TOKEN: ${{ secrets.SCHNAUZER_ACCESS_TOKEN }}
          CAVALIER_ACCOUNT_ID: ${{ secrets.CAVALIER_ACCOUNT_ID }}
          CAVALIER_ACCESS_TOKEN: ${{ secrets.CAVALIER_ACCESS_TOKEN }}
        run: python analyzer/fetch_insights.py

      - name: Upload logs
        uses: actions/upload-artifact@v4
        with:
          name: post-logs
          path: logs/
          retention-days: 90
